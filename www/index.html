<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMP Georgia Admin - Multi-Platform</title>
    <style>
        :root { --main: #ff9d00; --bg: #0f0f0f; --panel: #181818; --user-msg: #2a2a2a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- Sidebar (ჩათების სია) --- */
        #chat-list { width: 320px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; transition: 0.3s; z-index: 10; }
        .list-header { padding: 20px; border-bottom: 1px solid #333; font-weight: bold; color: var(--main); display: flex; justify-content: space-between; }
        #list-container { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .chat-item:hover { background: #222; }
        .chat-item.active { background: #222; border-left: 4px solid var(--main); }
        .chat-item small { color: #888; display: block; margin-top: 4px; }

        /* --- Main Panel (საუბარი) --- */
        #main-panel { flex: 1; display: flex; flex-direction: column; position: relative; background: #121212; }
        .chat-header { padding: 15px; background: var(--panel); border-bottom: 1px solid #333; display: flex; align-items: center; gap: 15px; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }

        /* --- მესიჯების სტილი --- */
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 14px; word-wrap: break-word; line-height: 1.5; }
        .user-msg { background: var(--user-msg); align-self: flex-start; border-bottom-left-radius: 2px; }
        .admin-msg { background: var(--main); color: black; align-self: flex-end; border-bottom-right-radius: 2px; }
        .admin-msg a { color: #000; text-decoration: underline; font-weight: bold; }
        .system-msg { align-self: center; font-size: 11px; color: #666; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 10px; }

        /* --- კონტროლები --- */
        #quick-replies { padding: 10px; display: flex; gap: 8px; overflow-x: auto; background: var(--panel); border-top: 1px solid #333; }
        .q-btn { background: #252525; border: 1px solid var(--main); color: var(--main); padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; }
        #input-area { padding: 15px; background: var(--panel); display: flex; gap: 10px; align-items: center; }
        #admin-input { flex: 1; padding: 12px 20px; border-radius: 30px; border: 1px solid #444; background: #222; color: white; outline: none; }
        .btn-send { background: var(--main); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 18px; }

        /* --- მობილურის ადაპტაცია --- */
        @media (max-width: 768px) {
            #chat-list { position: absolute; width: 100%; height: 100%; }
            #chat-list.hidden { transform: translateX(-100%); }
            #main-panel { width: 100%; }
            .back-btn { display: block !important; }
        }
        .back-btn { display: none; background: none; border: none; color: var(--main); font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- ჩათების სია -->
    <div id="chat-list">
        <div class="list-header">
            აქტიური ჩათები 
            <span onclick="loadChatList()" style="cursor:pointer">🔄</span>
        </div>
        <div id="list-container"></div>
    </div>

    <!-- მთავარი პანელი -->
    <div id="main-panel">
        <div class="chat-header">
            <button class="back-btn" onclick="toggleMobileList(true)">⬅</button>
            <span id="current-user" style="font-weight: bold;">აირჩიეთ ჩათი</span>
            <div style="flex:1"></div>
            <button onclick="deleteCurrentChat()" style="background:none; border:none; color:#ff4444; cursor:pointer; font-size:18px">🗑️</button>
        </div>

        <div id="chat-window">
            <div style="text-align:center; color:#444; margin-top:100px;">საუბრის დასაწყებად აირჩიეთ მომხმარებელი</div>
        </div>

        <!-- სწრაფი პასუხები -->
        <div id="quick-replies" style="display:none;">
            <button class="q-btn" onclick="sendQuick('გამარჯობა, რით შემიძლია დაგეხმაროთ?')">მისალმება</button>
            <button class="q-btn" onclick="sendForumLink()">ფორუმი</button>
            <button class="q-btn" onclick="sendQuick('ინფორმაცია გადაეცა ტექნიკურ ჯგუფს.')">ტექნიკური</button>
            <button class="q-btn" onclick="sendQuick('მადლობა, სასიამოვნო თამაშს გისურვებთ!')">დასასრული</button>
        </div>

        <div id="input-area">
            <input type="text" id="admin-input" placeholder="ჩაწერეთ შეტყობინება..." onkeypress="if(event.key==='Enter') sendAdminMessage()">
            <button class="btn-send" onclick="sendAdminMessage()">></button>
        </div>
    </div>

<script>
    const dbURL = "https://ge-rp-web-default-rtdb.europe-west1.firebasedatabase.app/chats";
    let activeUserId = null;

    // მობილურზე სიის გამოჩენა/დამალვა
    function toggleMobileList(show) {
        const list = document.getElementById('chat-list');
        if(show) list.classList.remove('hidden');
        else list.classList.add('hidden');
    }

    function loadChatList() {
        fetch(dbURL + ".json")
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('list-container');
            container.innerHTML = "";
            if(!data) return;

            Object.keys(data).forEach(id => {
                const div = document.createElement('div');
                div.className = `chat-item ${activeUserId === id ? 'active' : ''}`;
                div.onclick = () => selectChat(id);
                div.innerHTML = `
                    <span style="color:var(--main); font-weight:bold;">${id}</span>
                    <small>${data[id].adminJoined ? '🟢 Live' : '⏳ ელოდება'}</small>
                `;
                container.appendChild(div);
            });
        });
    }

    function selectChat(userId) {
        activeUserId = userId;
        document.getElementById('current-user').innerText = userId;
        document.getElementById('quick-replies').style.display = "flex";
        toggleMobileList(false); // დამალვა მობილურზე

        fetch(`${dbURL}/${userId}.json`, {
            method: "PATCH",
            body: JSON.stringify({ adminJoined: true })
        });

        loadMessages();
    }

    function loadMessages() {
        if(!activeUserId) return;
        fetch(`${dbURL}/${activeUserId}/messages.json`)
        .then(res => res.json())
        .then(data => {
            const win = document.getElementById('chat-window');
            win.innerHTML = "";
            if(!data) return;

            Object.values(data).forEach(m => {
                let cls = (m.sender === "admin") ? "admin-msg" : (m.sender === "მომხმარებელი" ? "user-msg" : "system-msg");
                // ვიყენებთ innerHTML-ს რომ ლინკები გამოჩნდეს
                win.innerHTML += `<div class="msg ${cls}"><b>${m.sender}:</b><br>${m.text}</div>`;
            });
            win.scrollTop = win.scrollHeight;
        });
    }

    function sendAdminMessage() {
        const input = document.getElementById('admin-input');
        const text = input.value.trim();
        if(!text || !activeUserId) return;

        fetch(`${dbURL}/${activeUserId}/messages.json`, {
            method: "POST",
            body: JSON.stringify({ sender: "admin", text: text, time: Date.now() })
        }).then(() => {
            input.value = "";
            loadMessages();
        });
    }

    function sendQuick(text) {
        // სწრაფი პასუხი პირდაპირ აგზავნის ტექსტს
        fetch(`${dbURL}/${activeUserId}/messages.json`, {
            method: "POST",
            body: JSON.stringify({ sender: "admin", text: text, time: Date.now() })
        }).then(() => loadMessages());
    }

    function deleteCurrentChat() {
        if(!activeUserId || !confirm("წავშალოთ ჩათი?")) return;
        fetch(`${dbURL}/${activeUserId}.json`, { method: "DELETE" })
        .then(() => {
            activeUserId = null;
            toggleMobileList(true);
            loadChatList();
            document.getElementById('chat-window').innerHTML = "";
        });
    }
function sendForumLink() {
    const link = "ფორუმის ლინკი: <a target='_blank' class='msg-url' href='https://gerp-forum.com'>https://gerp-forum.com</a>";
    sendQuick(link);
}

    setInterval(loadChatList, 5000);
    setInterval(loadMessages, 2000);
    window.onload = loadChatList;
</script>
</body>
</html>
